<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animovaná tlačítka</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <button class="btn btn-hover">HOVER</button>
    <button class="btn btn-ripple">RIPPLE</button>
    <button class="btn btn-gradient">GRADIENT</button>
    <button class="btn btn-3d">3D</button>
    <button class="btn btn-rotate" onclick="copyToClipboard()">ROTATE</button>
    <button class="btn btn-neon">NEON</button>
    <button class="btn btn-pulse">PULSE</button>

    <script>
        function copyToClipboard() {
            const textToCopy = "382828";
            navigator.clipboard.writeText(textToCopy).then(() => {
                let btn = document.querySelector(".btn-rotate");
                let originalText = btn.innerText;
                btn.innerText = "Zkopírováno";
                setTimeout(() => {
                    btn.innerText = originalText;
                }, 2000);
            }).catch(err => console.error("Chyba při kopírování: ", err));
        }
    </script>

</body>
</html>
