<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koťák</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #2d89ef;
            color: white;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 3em;
        }
        header p {
            margin: 5px 0 0;
            font-size: 1.2em;
        }
        nav {
            text-align: center;
            padding: 10px;
            background-color: #555;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 1.2em;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        .content h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .gallery img {
            margin: 10px;
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
        footer {
            background-color: #2d89ef;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Koťák</h1>
        <p>Technologie a Programování</p>
    </header>
    <nav>
        <a href="#o-mne">O mně</a>
        <a href="#kontakt">Kontakt</a>
    </nav>
    <div class="content">
        <section id="o-mne">
            <h2>O mně</h2>
            <p>Jsem Koťák a zabívám se technologiemi. Na mém Instagramu sdílím novinky ze světa techniky i když ne tak často ale zdílím.</p>
        </section>
        </section>
        <section id="kontakt">
            <h2>Kontakt</h2>
            <p>Sleduj mě na sociálních sítích:</p>
            <p>
                <a href="https://www.instagram.com/kotakovec" target="_blank">Instagram</a>
                <a href="https://www.youtube.com/@kotakovec" target="_blank">YouTube</a>
            </p>
        </section>
    </div>
    <footer>
        <p>&copy; Kotakovec - 2025</p>
    </footer>
</body>
</html>
